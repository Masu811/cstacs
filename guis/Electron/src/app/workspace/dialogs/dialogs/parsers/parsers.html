<dialog [open]="appData.parsersOpen()">
  <div class="frame">
    <h1>Parsers</h1>
  </div>
  <div class="tabbar">
    <span class="tab" [class.active]="tab() == 'types'" (click)="tab.set('types')">Types</span>
    <span class="tab" [class.active]="tab() == 'advTypes'" (click)="tab.set('advTypes')">Advanced Types</span>
    <span class="tab" [class.active]="tab() == 'math'" (click)="tab.set('math')">Math</span>
    <span class="tab" [class.active]="tab() == 'advMath'" (click)="tab.set('advMath')">Advanced Math</span>
    <span class="tab" [class.active]="tab() == 'text'" (click)="tab.set('text')">Text</span>
    <span class="tab" [class.active]="tab() == 'datetime'" (click)="tab.set('datetime')">Datetime</span>
  </div>
  @if (tab() == "types") {
    <div class="tabcontent">
      <option (click)="select('float')">to number</option>
      <option (click)="select('string')">to text</option>
      <option (click)="select('datetime')">to datetime</option>
    </div>
  } @else if (tab() == "advTypes") {
    <div class="tabcontent">
      <option (click)="select('bool')">to bool</option>
      <option (click)="select('u8')">to u8</option>
      <option (click)="select('u16')">to u16</option>
      <option (click)="select('u32')">to u32</option>
      <option (click)="select('u64')">to u64</option>
      <option (click)="select('i8')">to i8</option>
      <option (click)="select('i16')">to i16</option>
      <option (click)="select('i32')">to i32</option>
      <option (click)="select('i64')">to i64</option>
      <option (click)="select('f32')">to f32</option>
      <option (click)="select('f64')">to f64</option>
      <option (click)="select('usize')">to usize</option>
      <option (click)="select('to_hex')">to hex (string)</option>
      <option (click)="select('from_hex')">from hex</option>
      <option (click)="select('to_bin')">to bin (string)</option>
      <option (click)="select('from_bin')">from bin</option>
      <option (click)="select('to_scientific')">to scientific (string)</option>
      <option (click)="select('isfinite')">isfinite (bool)</option>
      <option (click)="select('isnan')">isnan (bool)</option>
      <option (click)="select('isinf')">isinf (bool)</option>
    </div>
  } @else if (tab() == "math") {
    <div class="tabcontent">
      <option (click)="select('add')">add</option>
      <option (click)="select('sub')">subtract</option>
      <option (click)="select('mul')">multiply</option>
      <option (click)="select('div')">divide</option>
      <option (click)="select('round')">round</option>
      <option (click)="select('floor')">floor</option>
      <option (click)="select('ceil')">ceil</option>
      <option (click)="select('trunc')">trunc</option>
      <option (click)="select('fract')">fract</option>
      <option (click)="select('mod')">mod</option>
      <option (click)="select('floor_div')">floor div</option>
      <option (click)="select('square')">square</option>
      <option (click)="select('sqrt')">sqrt</option>
      <option (click)="select('pow')">pow</option>
      <option (click)="select('exp')">exp</option>
      <option (click)="select('log')">log</option>
    </div>
  } @else if (tab() == "advMath") {
    <div class="tabcontent">
      <option (click)="select('sin')">sin</option>
      <option (click)="select('tan')">tan</option>
      <option (click)="select('arcsin')">arcsin</option>
      <option (click)="select('arctan')">arctan</option>
      <option (click)="select('deg')">to degrees</option>
      <option (click)="select('rad')">to radians</option>
      <option (click)="select('sinh')">sinh</option>
      <option (click)="select('tanh')">tanh</option>
      <option (click)="select('arsinh')">arsinh</option>
      <option (click)="select('artanh')">artanh</option>
      <option (click)="select('erf')">erf</option>
      <option (click)="select('gamma')">gamma</option>
    </div>
  } @else if (tab() == "text") {
    <div class="tabcontent">
      <option (click)="select('lower')">to lowercase</option>
      <option (click)="select('upper')">to uppercase</option>
      <option (click)="select('capitalize')">capitalize</option>
      <option (click)="select('title')">title</option>
      <option (click)="select('replace')">replace</option>
      <option (click)="select('splice')">splice</option>
      <option (click)="select('append')">append</option>
      <option (click)="select('prepend')">prepend</option>
      <option (click)="select('startswith')">starts with</option>
      <option (click)="select('endswith')">ends with</option>
      <option (click)="select('contains')">contains</option>
      <option (click)="select('trim')">trim</option>
    </div>
  } @else if (tab() == "datetime") {
    <div class="tabcontent">
      <option (click)="select('to_year')">to year</option>
      <option (click)="select('to_month')">to month</option>
      <option (click)="select('to_day')">to day</option>
      <option (click)="select('to_weekday')">to weekday</option>
      <option (click)="select('to_hour')">to hour</option>
      <option (click)="select('to_minute')">to minute</option>
      <option (click)="select('to_second')">to second</option>
      <option (click)="select('to_milli')">to millisecond</option>
      <option (click)="select('to_nano')">to nanosecond</option>
      <option (click)="select('timedelta')">time difference</option>
      <option (click)="select('unixepoch')">seconds to Unix epoch</option>
    </div>
  }
  <parser-arg-form [parserUI]="parserUI()" />
</dialog>
