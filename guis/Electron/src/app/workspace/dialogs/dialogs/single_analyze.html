<dialog [open]="dialogOpen()()">
  <div class="frame">
    <h1>SingleSpectrum.analyze</h1>
  </div>
  <form (submit)="submit($event)">
    <h3>S Parameter</h3>
    <div>
      <label for="s_width">Width:</label>
      <input id="s_width" [formField]="args.s_width" type="number" step="any"/>
    </div>
    <h3>W Parameter</h3>
    <div>
      <label for="w_width">Width:</label>
      <input id="w_width" [formField]="args.w_width" type="number" step="any"/>
      <label for="w_dist">Distance:</label>
      <input id="w_dist" [formField]="args.w_dist" type="number" step="any"/>
      <label for="w_rightonly">Right Side Only:</label>
      <input id="w_rightonly" [formField]="args.w_rightonly" type="checkbox"/>
    </div>
    <h3>Peak and Background</h3>
    <div>
      <label for="peak_width">Peak Width:</label>
      <input id="peak_width" [formField]="args.peak_width" type="number" step="any"/>
    </div>
    <div>
      <label for="bg_corr">Background Correction:</label>
      <input id="bg_corr" [formField]="args.bg_corr" type="checkbox"/>
      <label for="bg_frac">Background Fraction:</label>
      <input id="bg_frac" [formField]="args.bg_frac" type="number" step="any"/>
    </div>
    <h3>Valley-To-Peak Parameter</h3>
    <div>
      <label for="v2p_valley_lower">Valley Lower Bound:</label>
      <input id="v2p_valley_lower" [formField]="args.v2p_valley_lower" type="number" step="any"/>
      <label for="v2p_valley_upper">Valley Upper Bound:</label>
      <input id="v2p_valley_upper" [formField]="args.v2p_valley_upper" type="number" step="any"/>
    </div>
    <div>
      <label for="v2p_peak_lower">Peak Lower Bound:</label>
      <input id="v2p_peak_lower" [formField]="args.v2p_peak_lower" type="number" step="any"/>
      <label for="v2p_peak_upper">Peak Upper Bound:</label>
      <input id="v2p_peak_upper" [formField]="args.v2p_peak_upper" type="number" step="any"/>
    </div>
    <h3>Energy Calibration Correction</h3>
    <div>
      <select id="follow_peak_order" [formField]="args.follow_peak_order">
        <option value="0">0-th Order Correction</option>
        <option value="1">1-st Order Correction</option>
        <option value="2">No Correction</option>
      </select>
    </div>
    <div class="frame">
      <button type="submit">Compute</button>
      <button type="button" (click)="close()">Cancel</button>
    </div>
  </form>
</dialog>
