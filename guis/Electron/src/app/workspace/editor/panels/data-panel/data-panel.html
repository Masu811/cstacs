<div id="container">
  @for (mult of appData.data(); track $index; let i = $index) {
    <dropdown
      [id]="[i].toString()"
      [name]="mult.name ?? 'unnamed'"
      [kind]="appData.dtypes.MULT"
      [(openCounter)]="openCounter"
      [globalToggle]="multToggle()"
      icon="mult.svg">
      @for (mc of mult.campaigns; track $index; let j = $index) {
        <dropdown
          [id]="[i, j].toString()"
          [name]="mc.name ?? 'unnamed'"
          [kind]="appData.dtypes.MC"
          [(openCounter)]="openCounter"
          [globalToggle]="mcToggle()"
          icon="mc.svg">
          @for (m of mc.measurements; track $index; let k = $index) {
            <dropdown
              [id]="[i, j, k].toString()"
              [name]="m.name ?? 'unnamed'"
              [kind]="appData.dtypes.M"
              [(openCounter)]="openCounter"
              [globalToggle]="mToggle()"
              icon="m.svg">
              @for (s of m.singles; track $index) {
                <leaf
                  [id]="[i, j, k, s].toString()"
                  [name]="s"
                  [kind]="appData.dtypes.S"
                  icon="S"></leaf>
              }
              @for (c of m.coinc; track $index) {
                <leaf
                  [id]="[i, j, k, c].toString()"
                  [name]="c"
                  [kind]="appData.dtypes.C"
                  icon="C"></leaf>
              }
            </dropdown>
          }
        </dropdown>
      }
    </dropdown>
  }
</div>
<datatypes [openCounter]="openCounter()" (dtypeToggle)="handleDtypeToggle($event)"></datatypes>
