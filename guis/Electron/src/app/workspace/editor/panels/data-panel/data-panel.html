<datatypes [availDtypes]="availDtypes()" [(openCounter)]="openCounter" [(dtypeDisplayLevel)]="dtypeDisplayLevel"></datatypes>
@for (mult of data(); track $index; let i = $index) {
  <dropdown [name]="mult.name ?? 'unnamed'" [kind]="dtypes.MULT" [(openCounter)]="openCounter" icon="mult.svg">
    @for (mc of mult.campaigns; track $index; let j = $index) {
      <dropdown [name]="mc.name ?? 'unnamed'" [kind]="dtypes.MC" [(openCounter)]="openCounter" icon="mc.svg">
        @for (m of mc.measurements; track $index; let k = $index) {
          <dropdown [name]="m.name ?? 'unnamed'" [kind]="dtypes.M" [(openCounter)]="openCounter" icon="m.svg">
            @for (s of m.singles; track $index) {
              <leaf [name]="s" icon="S" [kind]="dtypes.S"></leaf>
            }
            @for (c of m.coinc; track $index) {
              <leaf [name]="c" icon="C" [kind]="dtypes.C"></leaf>
            }
          </dropdown>
        }
      </dropdown>
    }
  </dropdown>
}
