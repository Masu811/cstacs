@if (!projectLoaded()) {
  <div class="col">
    <h1>STACS</h1>
    <div class="row">
      <div class="hline"></div>
      <button>Open Project</button>
      <div class="hline"></div>
      <button>New Project</button>
      <div class="hline"></div>
    </div>
  </div>
} @else {
  <data-panel [(data)]="data" [(details)]="details"></data-panel>
  <metadata-panel [(details)]="details"></metadata-panel>
  <viz-panel [(data)]="data"></viz-panel>
}
